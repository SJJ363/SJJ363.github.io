<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Insurtech Daily — insurtech news, aggregated">
  <rect width="1200" height="630" fill="#f7f4ee"/>
  <rect x="0" y="0" width="1200" height="12" fill="#9a2b1e"/>

  <!-- Masthead mark, scaled from the favicon geometry -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="20" height="120" fill="#9a2b1e"/>
    <rect x="40" y="20" width="150" height="18" fill="#1c1a15"/>
    <rect x="40" y="58" width="150" height="13" fill="#837d70"/>
    <rect x="40" y="88" width="105" height="13" fill="#837d70"/>
  </g>

  <text x="96" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="700" fill="#1c1a15">Insurtech Daily</text>
  <text x="100" y="452" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="500" fill="#5c564b">Everything moving in insurtech.</text>
  <text x="100" y="516" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#837d70">Funding · deals · launches · platform shifts — aggregated all day.</text>

  <g transform="translate(96,556)">
    <circle cx="8" cy="8" r="8" fill="#9a2b1e"/>
    <text x="28" y="15" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#9a2b1e" letter-spacing="1">LIVE · REFRESHED THROUGH THE DAY</text>
  </g>
</svg>
