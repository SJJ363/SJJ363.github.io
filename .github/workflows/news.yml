name: Refresh insurtech news

on:
  schedule:
    # A few times a day — every 6 hours (UTC). GitHub may delay runs under load.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch latest news
        run: node scripts/fetch-news.js

      # Optional upgrade: let Claude rewrite the brief, authenticated by a
      # Claude subscription via CLAUDE_CODE_OAUTH_TOKEN (no metered API key).
      # Fail-safe — if the secret is missing or the call fails, the build
      # keeps the deterministic brief written by fetch-news.js.
      - name: Enhance brief with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "No CLAUDE_CODE_OAUTH_TOKEN secret set — keeping deterministic brief."
            exit 0
          fi
          npm install -g @anthropic-ai/claude-code
          node scripts/write-brief.js || echo "Brief enhancer failed — keeping deterministic brief."

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/news.json)" ]; then
            git add data/news.json
            git commit -m "chore: refresh insurtech news ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "News updated and pushed."
          else
            echo "No changes to publish."
          fi
