name: Refresh insurtech news

on:
  schedule:
    # A few times a day — every 6 hours (UTC). GitHub may delay runs under load.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch latest news
        run: node scripts/fetch-news.js

      # Install the Claude CLI once (used by both company extraction and the
      # brief). Authenticated by a Claude subscription via the OAuth token —
      # no metered API key. Skipped cleanly when the secret isn't set.
      - name: Install Claude CLI
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "No CLAUDE_CODE_OAUTH_TOKEN secret set — Claude steps will fall back."
          else
            npm install -g @anthropic-ai/claude-code
          fi

      # Extract companies with Claude (heuristic fallback), tag each article,
      # and update the persistent company index (accumulates across batches).
      - name: Update company index
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node scripts/companies.js || echo "Company index step failed — keeping previous."

      # Let Claude rewrite the brief. Fail-safe — a missing secret or a failed
      # call keeps the deterministic brief written by fetch-news.js.
      - name: Enhance brief with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "No CLAUDE_CODE_OAUTH_TOKEN secret set — keeping deterministic brief."
            exit 0
          fi
          node scripts/write-brief.js || echo "Brief enhancer failed — keeping deterministic brief."

      # Regenerate all SEO artifacts from the refreshed data: static
      # per-company pages, sitemap.xml, robots.txt, and the structured
      # data injected into index.html / companies.html.
      - name: Build SEO (pages, sitemap, structured data)
        run: node scripts/seo.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/ company/ sitemap.xml robots.txt index.html companies.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh insurtech news ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "News + SEO updated and pushed."
          else
            echo "No changes to publish."
          fi
